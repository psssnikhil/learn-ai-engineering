# Curriculum — single source of truth for site navigation
#
# HOW TO ADD A NEW COURSE:
#   1. Add a block under `courses` (or `tracks`) in sequential order
#   2. Run: npm run sync-nav
#   3. Update docs/learn/index.md course table (or run sync-nav if we auto-generate it later)
#
# Folder paths stay as-is (module-NN-* on disk for platform sync).
# Display titles here — no M-numbers in the UI.

courses:
  # ── Part 1: Understand AI ─────────────────────────────
  - title: GenAI Foundations
    path: foundations/module-00-genai-foundations-from-nlp-to-transformers

