site_name: AI Engineering Handbook
site_description: Open-source knowledge base for learning AI engineering — agents, RAG, LLMOps, and more.
site_url: https://psssnikhil.github.io/learn-ai-engineering/
repo_url: https://github.com/psssnikhil/learn-ai-engineering
repo_name: learn-ai-engineering

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.integrate

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Learning Path: learning-path.md
  - Foundations:
      - Overview: foundations/index.md
      - "M00 · GenAI Foundations: From NLP to Transformers": foundations/module-00-genai-foundations-from-nlp-to-transformers/index.md
      - M01 · AI Engineering Essentials: foundations/module-01-ai-engineering-essentials/index.md
      - "M05 · Neural Networks & Deep Learning Fundamentals": foundations/module-05-neural-networks-deep-learning-fundamentals/index.md
      - "M06 · Transformers & Attention Mechanisms": foundations/module-06-transformers-attention-mechanisms/index.md
      - M07 · Large Language Models (LLMs): foundations/module-07-large-language-models-llms/index.md
  - Build:
      - Overview: build/index.md
      - "M09 · RAG: Retrieval Augmented Generation": build/module-09-rag-retrieval-augmented-generation/index.md
      - M11 · AI Agents Fundamentals: build/module-11-ai-agents-fundamentals/index.md
      - M12 · Multi-Agent Systems: build/module-12-multi-agent-systems/index.md
      - M13 · Vector Databases Deep Dive: build/module-13-vector-databases-deep-dive/index.md
      - M14 · Prompt Engineering Mastery: build/module-14-prompt-engineering-mastery/index.md
  - Production:
      - Overview: production/index.md
      - "M10 · LLMOps & Production Systems": production/module-10-llmops-production-systems/index.md
      - "M16 · AI Safety & Ethics": production/module-16-ai-safety-ethics/index.md
  - Advanced:
      - Overview: advanced/index.md
      - "M15 · Fine-Tuning & Custom Models": advanced/module-15-fine-tuning-custom-models/index.md
      - M17 · Capstone Projects: advanced/module-17-capstone-projects/index.md
  - Resources:
      - Overview: resources/index.md
      - Papers: resources/papers.md
      - Videos: resources/videos.md
      - Tools & Libraries: resources/tools-and-libraries.md
  - Projects: projects/index.md
