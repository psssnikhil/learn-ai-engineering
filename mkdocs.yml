site_name: AI Engineering Handbook
site_description: One-stop open-source curriculum for AI and ML engineering
site_url: https://psssnikhil.github.io/learn-ai-engineering/
repo_url: https://github.com/psssnikhil/learn-ai-engineering
repo_name: learn-ai-engineering
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax-config.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/mermaid-init.js

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.arithmatex:
      generic: false
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

validation:
  omitted_files: ignore
  absolute_links: ignore
  unrecognized_links: ignore

nav:
  - Home: index.md
  - Start Here: start-here.md
  - Learn:
      - Overview: learn/index.md
      - 01. GenAI Foundations: foundations/module-00-genai-foundations-from-nlp-to-transformers/index.md
      - 02. AI Engineering Essentials: foundations/module-01-ai-engineering-essentials/index.md
      - "03. Neural Networks & Deep Learning": foundations/module-05-neural-networks-deep-learning-fundamentals/index.md
      - "04. Transformers & Attention": foundations/module-06-transformers-attention-mechanisms/index.md
      - 05. Large Language Models: foundations/module-07-large-language-models-llms/index.md
      - 06. RAG — Retrieval Augmented Generation: build/module-09-rag-retrieval-augmented-generation/index.md
      - 07. AI Agents: build/module-11-ai-agents-fundamentals/index.md
      - "08. Agent Harness & Runtime": build/module-18-agent-harness-tools-runtime/index.md
      - 09. Multi-Agent Systems: build/module-12-multi-agent-systems/index.md
      - 10. Vector Databases: build/module-13-vector-databases-deep-dive/index.md
      - 11. Prompt Engineering: build/module-14-prompt-engineering-mastery/index.md
      - "12. LLMOps & Production Systems": production/module-10-llmops-production-systems/index.md
      - "13. LLM Evaluation & Quality": production/module-19-llm-evaluation-quality/index.md
      - "14. AI Safety & Ethics": production/module-16-ai-safety-ethics/index.md
      - "15. Fine-Tuning & Custom Models": advanced/module-15-fine-tuning-custom-models/index.md
      - 16. Capstone Projects: advanced/module-17-capstone-projects/index.md
      - Track · Agent Engineering:
          - Overview: agent-engineering/index.md
          - The Agent Loop: agent-engineering/01-agent-loop.md
          - Memory Systems: agent-engineering/02-memory.md
          - "Tools & MCP": agent-engineering/03-tools-and-mcp.md
          - Harness Engineering: agent-engineering/04-harness-engineering.md
          - Orchestration: agent-engineering/05-orchestration.md
          - "Observability & Tracing": agent-engineering/06-observability-and-tracing.md
